name: watchdog

on:
  workflow_call:

permissions:
  issues: write
  pull-requests: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: openworld-maker/ops-infra
          ref: v1
          path: _ops_infra
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r _ops_infra/requirements.txt
      - run: python3 _ops_infra/scripts/ops/watchdog.py
